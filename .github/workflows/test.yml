name: Test

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --verbose

      - name: Run all unit tests
        run: cargo test --verbose

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Formatting check
        run: cargo fmt --check

      - name: Test shell init scripts
        shell: bash
        run: |
          cargo run -- init bash --cmd b > /dev/null
          cargo run -- init zsh --cmd b > /dev/null
          cargo run -- init fish --cmd b > /dev/null
          cargo run -- init bash --cmd '' > /dev/null
          cargo run -- init zsh --no-cmd --path /tmp > /dev/null
          cargo run -- init bash --cmd --prefix p --suffix + > /dev/null
          echo "All init scripts generated successfully"

      - name: Test shell completions (all shells)
        shell: bash
        run: |
          cargo run -- completions bash > /dev/null
          cargo run -- completions zsh > /dev/null
          cargo run -- completions fish > /dev/null
          cargo run -- completions powershell > /dev/null
          echo "All completion scripts generated successfully"

      - name: Test PowerShell completions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = cargo run -- completions powershell 2>$null
          if (-not $output) { throw "Empty completion output" }

          $regCount = ($output | Select-String "Register-ArgumentCompleter").Count
          if ($regCount -ne 1) { throw "Expected 1 Register-ArgumentCompleter, got $regCount" }

          $remoteCount = ($output | Select-String "__complete-remote").Count
          if ($remoteCount -eq 0) { throw "Remote completion injection missing" }

          $output | Out-String | Invoke-Expression
          Write-Host "PowerShell completions loaded successfully"

      - name: Test __complete-remote (no crash on invalid input)
        shell: bash
        run: |
          cargo run -- __complete-remote "nonexistent-host:/path" 2>/dev/null || true
          cargo run -- __complete-remote "not-a-remote" 2>/dev/null || true
          echo "__complete-remote handled gracefully"

      - name: Test copy operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-test-src /tmp/bcmr-test-dst
          echo "hello" > /tmp/bcmr-test-src/file1.txt
          echo "world" > /tmp/bcmr-test-src/file2.txt
          mkdir -p /tmp/bcmr-test-src/subdir
          echo "nested" > /tmp/bcmr-test-src/subdir/file3.txt

          # Single file copy
          cargo run -- copy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/
          test -f /tmp/bcmr-test-dst/file1.txt
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/file1.txt

          # Multiple file copy
          mkdir -p /tmp/bcmr-test-multi
          cargo run -- copy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-src/file2.txt /tmp/bcmr-test-multi/
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-multi/file1.txt
          diff /tmp/bcmr-test-src/file2.txt /tmp/bcmr-test-multi/file2.txt

          # Recursive directory copy (dst exists -> src dir nested inside)
          mkdir -p /tmp/bcmr-test-dst/recursive-test
          cargo run -- copy -r /tmp/bcmr-test-src/ /tmp/bcmr-test-dst/recursive-test/
          diff /tmp/bcmr-test-src/subdir/file3.txt /tmp/bcmr-test-dst/recursive-test/bcmr-test-src/subdir/file3.txt

          # Force overwrite
          echo "modified" > /tmp/bcmr-test-src/file1.txt
          cargo run -- copy -fy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/file1.txt

          echo "Copy tests passed"

      - name: Test copy with verify
        shell: bash
        run: |
          echo "verify-test-content" > /tmp/bcmr-test-src/verify.txt
          cargo run -- copy --verify /tmp/bcmr-test-src/verify.txt /tmp/bcmr-test-dst/
          diff /tmp/bcmr-test-src/verify.txt /tmp/bcmr-test-dst/verify.txt
          echo "Copy with verify passed"

      - name: Test copy with preserve
        if: runner.os != 'Windows'
        shell: bash
        run: |
          touch -t 202001011200 /tmp/bcmr-test-src/file1.txt
          cargo run -- copy -p /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/preserved.txt
          test -f /tmp/bcmr-test-dst/preserved.txt
          echo "Copy with preserve passed"

      - name: Test dry-run mode
        shell: bash
        run: |
          cargo run -- copy -r -n /tmp/bcmr-test-src/ /tmp/bcmr-test-dst/dryrun-target/
          # Directory should NOT exist after dry run
          test ! -d /tmp/bcmr-test-dst/dryrun-target/
          echo "Dry-run test passed"

      - name: Test exclude patterns
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-exclude-src /tmp/bcmr-exclude-dst
          echo "keep" > /tmp/bcmr-exclude-src/keep.txt
          echo "skip" > /tmp/bcmr-exclude-src/skip.log
          echo "keep2" > /tmp/bcmr-exclude-src/keep2.md
          cargo run -- copy -r --exclude='\.log$' /tmp/bcmr-exclude-src/ /tmp/bcmr-exclude-dst/
          test -f /tmp/bcmr-exclude-dst/bcmr-exclude-src/keep.txt
          test ! -f /tmp/bcmr-exclude-dst/bcmr-exclude-src/skip.log
          echo "Exclude pattern test passed"

      - name: Test move operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-move-dst
          echo "moveme" > /tmp/bcmr-move-src.txt
          cargo run -- move /tmp/bcmr-move-src.txt /tmp/bcmr-move-dst/
          test -f /tmp/bcmr-move-dst/bcmr-move-src.txt
          test ! -f /tmp/bcmr-move-src.txt
          echo "Move test passed"

      - name: Test remove operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-rm-test
          echo "deleteme" > /tmp/bcmr-rm-test/file.txt
          cargo run -- remove -f /tmp/bcmr-rm-test/file.txt
          test ! -f /tmp/bcmr-rm-test/file.txt

          echo "a" > /tmp/bcmr-rm-test/a.txt
          echo "b" > /tmp/bcmr-rm-test/b.txt
          cargo run -- remove -rf /tmp/bcmr-rm-test/
          test ! -d /tmp/bcmr-rm-test/
          echo "Remove tests passed"

      - name: Test remove with symlinks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Regression test for: remove_path only handled is_file/is_dir and
          # silently skipped symlinks, which then made rmdir on the parent
          # fail with ENOTEMPTY. This covers both valid and dangling links
          # plus the top-level symlink case.
          set -eu
          root=/tmp/bcmr-symlink-test
          rm -rf "$root"
          mkdir -p "$root/dir"

          echo content > "$root/target.txt"
          ln -s "$root/target.txt" "$root/dir/valid_link"
          ln -s /nonexistent/path "$root/dir/dangling_link"
          echo real > "$root/dir/real_file"

          cargo run -- remove -rf "$root/dir"
          test ! -e "$root/dir" || { echo "FAIL: dir not removed"; exit 1; }
          test -f "$root/target.txt" || { echo "FAIL: symlink target was followed"; exit 1; }

          # Top-level dangling symlink
          ln -s /nonexistent "$root/top_dangling"
          cargo run -- remove -f "$root/top_dangling"
          test ! -e "$root/top_dangling" || { echo "FAIL: top-level symlink not removed"; exit 1; }

          echo "Symlink remove tests passed"

      - name: Test --json error event and status state machine
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Regression test for: errors after runner creation produced no
          # terminal event in the log, so bcmr status reported "done" for
          # jobs that had actually failed. Also covers the done/failed/
          # interrupted state machine.
          set -eu
          root=/tmp/bcmr-status-sm
          rm -rf "$root"
          mkdir -p "$root/sub"
          echo x > "$root/sub/a.txt"

          # --- happy path: status should be "done" ---
          rm -rf "$root/ok"
          mkdir -p "$root/ok"
          echo ok > "$root/ok/f.txt"
          desc=$(cargo run --quiet -- remove -rfy --json "$root/ok")
          jid=$(echo "$desc" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["job_id"])')
          log=$(echo "$desc" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["log"])')
          for _ in $(seq 1 60); do
            if grep -q '"type":"result"' "$log" 2>/dev/null; then break; fi
            sleep 0.5
          done
          cargo run --quiet -- status "$jid" --json | grep -q '"state":"done"' \
            || { echo "FAIL: happy path not done"; cat "$log"; exit 1; }

          # --- error path: non-recursive remove of a non-empty dir ---
          # Must terminate the log with a status:"error" result and
          # status must report "failed".
          desc=$(cargo run --quiet -- remove --json "$root/sub" 2>&1 | head -1)
          jid=$(echo "$desc" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["job_id"])')
          log=$(echo "$desc" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["log"])')
          for _ in $(seq 1 60); do
            if grep -q '"type":"result"' "$log" 2>/dev/null; then break; fi
            sleep 0.5
          done
          cat "$log"
          grep -q '"status":"error"' "$log" \
            || { echo "FAIL: error path did not write error result"; exit 1; }
          cargo run --quiet -- status "$jid" --json | grep -q '"state":"failed"' \
            || { echo "FAIL: status did not report failed"; exit 1; }

          echo "Error event + state machine tests passed"

      - name: Test --json background mode (remove)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Regression test for: --json bg mode writing nothing to the log
          # when check_removes took a long time. The child must emit a
          # scanning heartbeat before the scan completes, and the log must
          # contain a terminal "result" line after the job finishes.
          set -eu

          root=/tmp/bcmr-json-bg
          rm -rf "$root"
          mkdir -p "$root"
          # ~5k files across many dirs so scanning is non-trivial.
          for i in $(seq 1 100); do
            mkdir -p "$root/dir$i"
            for j in $(seq 1 50); do
              echo "x$j" > "$root/dir$i/f$j.txt"
            done
          done

          # Build targets list (26 paths to mirror the reported bug).
          targets=""
          for i in $(seq 1 26); do targets="$targets $root/dir$i"; done

          desc=$(cargo run --quiet -- remove -rfy --json $targets)
          echo "descriptor: $desc"

          job_id=$(echo "$desc" | python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["job_id"])')
          log=$(echo "$desc" | python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["log"])')
          echo "job_id=$job_id log=$log"

          # Wait up to 30s for the result line to appear.
          for _ in $(seq 1 60); do
            if grep -q '"type":"result"' "$log" 2>/dev/null; then
              break
            fi
            sleep 0.5
          done

          echo "--- log contents ---"
          cat "$log"
          echo "--- end log ---"

          # The log must contain at least one progress line AND a terminal
          # result line. A regression of the scan-blocks-writer bug would
          # leave the log with only the descriptor.
          grep -q '"type":"progress"' "$log" || { echo "FAIL: no progress line"; exit 1; }
          grep -q '"type":"result"' "$log" || { echo "FAIL: no result line"; exit 1; }
          grep -q '"status":"success"' "$log" || { echo "FAIL: job did not succeed"; exit 1; }

          # All 26 target dirs should be gone.
          for i in $(seq 1 26); do
            if [ -e "$root/dir$i" ]; then
              echo "FAIL: $root/dir$i still exists"
              exit 1
            fi
          done

          # bcmr status should find the job and report complete.
          status=$(cargo run --quiet -- status "$job_id" --json)
          echo "status: $status"
          echo "$status" | grep -q '"type":"result"' || { echo "FAIL: status did not return result"; exit 1; }

          echo "--json background mode remove test passed"

      - name: Test version and help
        shell: bash
        run: |
          cargo run -- --version
          cargo run -- --help
          cargo run -- copy --help
          cargo run -- move --help
          cargo run -- remove --help
          cargo run -- init --help
          cargo run -- update --help
          cargo run -- completions --help
          echo "Help/version tests passed"
