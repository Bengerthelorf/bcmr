name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --verbose

      - name: Run unit tests
        run: cargo test --verbose

      - name: Run clippy (advisory only)
        run: cargo clippy -- -W clippy::all
        continue-on-error: true

      - name: Check formatting (advisory only)
        run: cargo fmt --check
        continue-on-error: true

      - name: Test shell init scripts
        shell: bash
        run: |
          cargo run -- init bash --cmd b > /dev/null
          cargo run -- init zsh --cmd b > /dev/null
          cargo run -- init fish --cmd b > /dev/null
          cargo run -- init bash --cmd '' > /dev/null
          cargo run -- init zsh --no-cmd --path /tmp > /dev/null
          cargo run -- init bash --cmd --prefix p --suffix + > /dev/null
          echo "All init scripts generated successfully"

      - name: Test shell completions (all shells)
        shell: bash
        run: |
          cargo run -- completions bash > /dev/null
          cargo run -- completions zsh > /dev/null
          cargo run -- completions fish > /dev/null
          cargo run -- completions powershell > /dev/null
          echo "All completion scripts generated successfully"

      - name: Test PowerShell completions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = cargo run -- completions powershell 2>$null
          if (-not $output) { throw "Empty completion output" }

          $regCount = ($output | Select-String "Register-ArgumentCompleter").Count
          if ($regCount -ne 1) { throw "Expected 1 Register-ArgumentCompleter, got $regCount" }

          $remoteCount = ($output | Select-String "__complete-remote").Count
          if ($remoteCount -eq 0) { throw "Remote completion injection missing" }

          $output | Out-String | Invoke-Expression
          Write-Host "PowerShell completions loaded successfully"

      - name: Test __complete-remote (no crash on invalid input)
        shell: bash
        run: |
          cargo run -- __complete-remote "nonexistent-host:/path" 2>/dev/null || true
          cargo run -- __complete-remote "not-a-remote" 2>/dev/null || true
          echo "__complete-remote handled gracefully"

      - name: Test copy operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-test-src /tmp/bcmr-test-dst
          echo "hello" > /tmp/bcmr-test-src/file1.txt
          echo "world" > /tmp/bcmr-test-src/file2.txt
          mkdir -p /tmp/bcmr-test-src/subdir
          echo "nested" > /tmp/bcmr-test-src/subdir/file3.txt

          # Single file copy
          cargo run -- copy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/
          test -f /tmp/bcmr-test-dst/file1.txt
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/file1.txt

          # Multiple file copy
          mkdir -p /tmp/bcmr-test-multi
          cargo run -- copy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-src/file2.txt /tmp/bcmr-test-multi/
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-multi/file1.txt
          diff /tmp/bcmr-test-src/file2.txt /tmp/bcmr-test-multi/file2.txt

          # Recursive directory copy (dst exists → src dir nested inside)
          mkdir -p /tmp/bcmr-test-dst/recursive-test
          cargo run -- copy -r /tmp/bcmr-test-src/ /tmp/bcmr-test-dst/recursive-test/
          diff /tmp/bcmr-test-src/subdir/file3.txt /tmp/bcmr-test-dst/recursive-test/bcmr-test-src/subdir/file3.txt

          # Force overwrite
          echo "modified" > /tmp/bcmr-test-src/file1.txt
          cargo run -- copy -fy /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/
          diff /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/file1.txt

          echo "Copy tests passed"

      - name: Test copy with verify
        shell: bash
        run: |
          echo "verify-test-content" > /tmp/bcmr-test-src/verify.txt
          cargo run -- copy --verify /tmp/bcmr-test-src/verify.txt /tmp/bcmr-test-dst/
          diff /tmp/bcmr-test-src/verify.txt /tmp/bcmr-test-dst/verify.txt
          echo "Copy with verify passed"

      - name: Test copy with preserve
        if: runner.os != 'Windows'
        shell: bash
        run: |
          touch -t 202001011200 /tmp/bcmr-test-src/file1.txt
          cargo run -- copy -p /tmp/bcmr-test-src/file1.txt /tmp/bcmr-test-dst/preserved.txt
          test -f /tmp/bcmr-test-dst/preserved.txt
          echo "Copy with preserve passed"

      - name: Test dry-run mode
        shell: bash
        run: |
          cargo run -- copy -r -n /tmp/bcmr-test-src/ /tmp/bcmr-test-dst/dryrun-target/
          # Directory should NOT exist after dry run
          test ! -d /tmp/bcmr-test-dst/dryrun-target/
          echo "Dry-run test passed"

      - name: Test exclude patterns
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-exclude-src /tmp/bcmr-exclude-dst
          echo "keep" > /tmp/bcmr-exclude-src/keep.txt
          echo "skip" > /tmp/bcmr-exclude-src/skip.log
          echo "keep2" > /tmp/bcmr-exclude-src/keep2.md
          cargo run -- copy -r --exclude='\.log$' /tmp/bcmr-exclude-src/ /tmp/bcmr-exclude-dst/
          test -f /tmp/bcmr-exclude-dst/bcmr-exclude-src/keep.txt
          test ! -f /tmp/bcmr-exclude-dst/bcmr-exclude-src/skip.log
          echo "Exclude pattern test passed"

      - name: Test move operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-move-dst
          echo "moveme" > /tmp/bcmr-move-src.txt
          cargo run -- move /tmp/bcmr-move-src.txt /tmp/bcmr-move-dst/
          test -f /tmp/bcmr-move-dst/bcmr-move-src.txt
          test ! -f /tmp/bcmr-move-src.txt
          echo "Move test passed"

      - name: Test remove operations
        shell: bash
        run: |
          mkdir -p /tmp/bcmr-rm-test
          echo "deleteme" > /tmp/bcmr-rm-test/file.txt
          cargo run -- remove -f /tmp/bcmr-rm-test/file.txt
          test ! -f /tmp/bcmr-rm-test/file.txt

          echo "a" > /tmp/bcmr-rm-test/a.txt
          echo "b" > /tmp/bcmr-rm-test/b.txt
          cargo run -- remove -rf /tmp/bcmr-rm-test/
          test ! -d /tmp/bcmr-rm-test/
          echo "Remove tests passed"

      - name: Test version and help
        shell: bash
        run: |
          cargo run -- --version
          cargo run -- --help
          cargo run -- copy --help
          cargo run -- move --help
          cargo run -- remove --help
          cargo run -- init --help
          cargo run -- update --help
          cargo run -- completions --help
          echo "Help/version tests passed"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: bcmr-x86_64-linux
            strip: true
            ext: ""

          - target: x86_64-apple-darwin
            os: macos-latest
            name: bcmr-x86_64-macos
            strip: true
            ext: ""

          - target: aarch64-apple-darwin
            os: macos-latest
            name: bcmr-aarch64-macos
            strip: true
            ext: ""

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: bcmr-aarch64-linux
            strip: false
            cross: true
            ext: ""

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: bcmr-x86_64-windows
            strip: false
            ext: ".exe"

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: bcmr-aarch64-windows
            strip: false
            ext: ".exe"

          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            name: bcmr-x86_64-freebsd
            strip: false
            cross: true
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Configure build environment
        shell: bash
        run: |
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

      - name: Build binary
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.strip
        run: strip target/${{ matrix.target }}/release/bcmr${{ matrix.ext }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bcmr${{ matrix.ext }} dist/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            cd "$dir"
            if ls *.exe 1>/dev/null 2>&1; then
              zip "../${name}.zip" bcmr.exe
            else
              tar czf "../${name}.tar.gz" bcmr
            fi
            cd ..
          done

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            echo "### Changes since ${PREVIOUS_TAG}:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            FEATS=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD | grep -i "^- feat" || true)
            FIXES=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD | grep -i "^- fix" || true)
            OTHERS=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD | grep -iv "^- feat\|^- fix\|^- chore\|^- docs\|^- ci" || true)
            CHORES=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD | grep -i "^- chore\|^- docs\|^- ci" || true)

            if [ -n "$FEATS" ]; then
              echo "#### Features" >> CHANGELOG.md
              echo "$FEATS" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi

            if [ -n "$FIXES" ]; then
              echo "#### Bug Fixes" >> CHANGELOG.md
              echo "$FIXES" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi

            if [ -n "$OTHERS" ]; then
              echo "#### Other" >> CHANGELOG.md
              echo "$OTHERS" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi

            if [ -n "$CHORES" ]; then
              echo "<details><summary>Maintenance</summary>" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
              echo "$CHORES" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
              echo "</details>" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
          else
            echo "### Initial Release" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "## Download" >> CHANGELOG.md
          echo "Choose the appropriate binary for your platform:" >> CHANGELOG.md
          echo "- **Linux x86_64**: bcmr-x86_64-linux.tar.gz (statically linked)" >> CHANGELOG.md
          echo "- **Linux ARM64**: bcmr-aarch64-linux.tar.gz (statically linked)" >> CHANGELOG.md
          echo "- **macOS Intel**: bcmr-x86_64-macos.tar.gz" >> CHANGELOG.md
          echo "- **macOS Apple Silicon**: bcmr-aarch64-macos.tar.gz" >> CHANGELOG.md
          echo "- **Windows x86_64**: bcmr-x86_64-windows.zip" >> CHANGELOG.md
          echo "- **Windows ARM64**: bcmr-aarch64-windows.zip" >> CHANGELOG.md
          echo "- **FreeBSD x86_64**: bcmr-x86_64-freebsd.tar.gz" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-tap:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Release Info
        id: release
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          TAG=${GITHUB_REF#refs/tags/}
          echo "FORMULA_VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download Release Artifacts
        run: |
          VERSION=${{ steps.release.outputs.VERSION }}
          URL_ARM_MAC="https://github.com/Bengerthelorf/bcmr/releases/download/${VERSION}/bcmr-aarch64-macos.tar.gz"
          URL_INTEL_MAC="https://github.com/Bengerthelorf/bcmr/releases/download/${VERSION}/bcmr-x86_64-macos.tar.gz"
          URL_LINUX="https://github.com/Bengerthelorf/bcmr/releases/download/${VERSION}/bcmr-x86_64-linux.tar.gz"

          wget -q -O bcmr-aarch64-macos.tar.gz "$URL_ARM_MAC"
          wget -q -O bcmr-x86_64-macos.tar.gz "$URL_INTEL_MAC"
          wget -q -O bcmr-x86_64-linux.tar.gz "$URL_LINUX"

      - name: Calculate SHA256
        id: shasum
        run: |
          echo "SHA_ARM_MAC=$(sha256sum bcmr-aarch64-macos.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          echo "SHA_INTEL_MAC=$(sha256sum bcmr-x86_64-macos.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          echo "SHA_LINUX=$(sha256sum bcmr-x86_64-linux.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: Checkout Tap Repository
        uses: actions/checkout@v4
        with:
          repository: Bengerthelorf/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          cd homebrew-tap/Formula

          cat > bcmr.rb <<EOF
          class Bcmr < Formula
            desc "Better Copy Move Remove - A modern, safe file operation tool"
            homepage "https://github.com/Bengerthelorf/bcmr"
            version "${{ steps.release.outputs.FORMULA_VERSION }}"
            license "GPL-3.0"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/Bengerthelorf/bcmr/releases/download/${{ steps.release.outputs.VERSION }}/bcmr-aarch64-macos.tar.gz"
                sha256 "${{ steps.shasum.outputs.SHA_ARM_MAC }}"
              else
                url "https://github.com/Bengerthelorf/bcmr/releases/download/${{ steps.release.outputs.VERSION }}/bcmr-x86_64-macos.tar.gz"
                sha256 "${{ steps.shasum.outputs.SHA_INTEL_MAC }}"
              end
            elsif OS.linux?
              url "https://github.com/Bengerthelorf/bcmr/releases/download/${{ steps.release.outputs.VERSION }}/bcmr-x86_64-linux.tar.gz"
              sha256 "${{ steps.shasum.outputs.SHA_LINUX }}"
            end

            def install
              bin.install "bcmr"
            end

            test do
              system "#{bin}/bcmr", "--version"
            end
          end
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add bcmr.rb
          git commit -m "Update bcmr to ${{ steps.release.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main
