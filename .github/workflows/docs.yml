name: Trigger snaix.homes deploy

# Docs (Markdown under /docs) now live in the central snaix.homes site via a
# submodule. Pushing content changes here just pings the site's Cloudflare
# Pages deploy hook; the site's build does the rest (submodule refresh +
# Astro build). Store the hook URL in the repo's Secrets as
# SNAIX_DOCS_DEPLOY_HOOK.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::SNAIX_DOCS_DEPLOY_HOOK not set — skipping ping"
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
        env:
          HOOK: ${{ secrets.SNAIX_DOCS_DEPLOY_HOOK }}
